[uwsgi]
# ==========================================
# 1. Custom Variables (Only modify this section!)
# ==========================================
# Absolute path to your project's root directory (do not add a trailing slash)
base_dir = /home/ubuntu/MyDeadlineInUofG

# Your Django project name (the folder containing settings.py and wsgi.py)
project_name = UofGdeadline


# ==========================================
# 2. Core Paths (Auto-generated from variables above)
# ==========================================
# Set the working directory
chdir = %(base_dir)

# Path to your virtual environment
home = %(base_dir)/venv

# The WSGI module interface
module = %(project_name).wsgi:application

# Background logging path (essential for debugging)
daemonize = %(base_dir)/uwsgi.log


# ==========================================
# 3. Process & Communication Settings
# ==========================================
master = true
processes = 4
threads = 2

# Port for Nginx communication
# (Note: Change 'socket' to 'http' if testing directly via browser IP)
socket = 127.0.0.1:8000

# Automatically clean up environment (sockets/pid files) on exit
vacuum = true